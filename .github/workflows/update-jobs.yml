name: Update Jobs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch latest jobs
        run: node scripts/fetch-jobs.mjs

      - name: Commit updated data
        run: |
          git config user.name "fcs-careers-bot"
          git config user.email "actions@github.com"
          git add data/jobs.json
          git diff --cached --quiet || git commit -m "Auto-update jobs data"
          git push
